# Optional Ayame bindings. The installer will offer these instead of sourcing
# this file silently. Resolve /home/andrija/Projects to the install prefix.

bindr = SUPER, SUPER_L, exec, qs --path "$HOME/Projects/ayame-shell/config/quickshell" ipc call launcher toggle
bind = SUPER, RETURN, exec, kitty
bind = SUPER, F, fullscreen, 0
bind = SUPER SHIFT, F, togglefloating
bind = SUPER, Q, killactive

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = , PRINT, exec, "$HOME/Projects/ayame-shell/scripts/ayame-screenshot.sh" desktop 0
bind = SHIFT, PRINT, exec, "$HOME/Projects/ayame-shell/scripts/ayame-screenshot.sh" area 0
bind = SUPER, PRINT, exec, "$HOME/Projects/ayame-shell/scripts/ayame-screenshot.sh" monitor 0 DVI-D-1
