$wallpaper = $HOME/.local/share/ayame-shell/assets/wallpapers/ayame-default.jpg
$surface = rgba(1c1b22ee)
$surface_high = rgba(302d39ee)
$primary = rgb(d0bcff)
$on_primary = rgb(381e72)
$foreground = rgb(f0ecf4)
$muted = rgb(c9c3ce)
$error = rgb(ffb4ab)

general {
    ignore_empty_input = true
    hide_cursor = true
}

background {
    monitor =
    path = $wallpaper
    blur_passes = 3
    blur_size = 8
    color = $surface
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $foreground
    font_family = Adwaita Sans
    font_size = 76
    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $muted
    font_family = Adwaita Sans
    font_size = 18
    position = 0, 118
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi, $USER
    color = $primary
    font_family = Adwaita Sans
    font_size = 20
    position = 0, 35
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 58
    position = 0, -45
    halign = center
    valign = center
    rounding = 18
    outline_thickness = 2
    inner_color = $surface_high
    outer_color = $primary
    font_color = $foreground
    font_family = Adwaita Sans
    placeholder_text = Password…
    fail_text = $FAIL ($ATTEMPTS)
    fail_color = $error
    check_color = $primary
    dots_center = true
    dots_rounding = -1
    shadow_passes = 4
    shadow_size = 8
    shadow_color = rgba(00000066)
}
